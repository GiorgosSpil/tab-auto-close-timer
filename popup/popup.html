<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main id="app">
    <section id="no-timer" hidden>
      <div class="tab-label">
        <div class="title" id="current-title"></div>
      </div>
      <div class="presets">
        <button class="preset" data-seconds="3600">1h</button>
        <button class="preset" data-seconds="21540">5h 59m</button>
        <button class="preset" data-seconds="36000">10h</button>
      </div>
      <div class="custom">
        <span class="custom-label">Custom:</span>
        <input id="custom-hours" type="number" min="0" max="24" value="0" aria-label="Hours" />
        <span class="sep">h</span>
        <input id="custom-minutes" type="number" min="0" max="59" value="0" aria-label="Minutes" />
        <span class="sep">m</span>
        <input id="custom-seconds" type="number" min="0" max="59" value="0" aria-label="Seconds" />
        <span class="sep">s</span>
      </div>
      <button id="start-btn" class="primary">Start timer</button>
      <p class="error" id="start-error" hidden></p>
    </section>

    <section id="active-timer" hidden>
      <div class="countdown" id="current-countdown">--:--</div>
      <div class="actions">
        <button id="extend-btn">+5 min</button>
        <button id="cancel-btn" class="danger">Cancel timer</button>
      </div>
    </section>

    <section id="others" hidden>
      <h3 id="others-heading">Other active timers</h3>
      <ul id="others-list"></ul>
    </section>

    <p id="warning" class="warning" hidden></p>
  </main>
  <script type="module" src="popup.js"></script>
</body>
</html>
